spring.application.name=Zsmp1

# --- H2データベース設定 ---
spring.datasource.url=jdbc:h2:file:./data/testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA設定 ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 起動時に一度リセットしてテーブルを作り直す
spring.jpa.hibernate.ddl-auto=create
# 実行されるSQLをコンソールに表示する
spring.jpa.show-sql=true

# --- SQL初期化機能を有効にする ---
spring.sql.init.mode=always

# --- H2コンソール設定 ---
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# DBとの通信時にUTC（世界標準時）を使用する設定
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# 表示時に使用するタイムゾーンを東京に設定する
spring.jackson.time-zone=Asia/Tokyo

spring.jpa.properties.hibernate.type.last_updated_timestamp_enabled=true