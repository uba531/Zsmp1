<form th:action="@{/talent/complete}" method="post" th:object="${talentForm}">
    <input type="hidden" th:field="*{talentName}">	
    <input type="hidden" th:field="*{reason}">
    <button type="submit">確定</button>
</form>

<form th:action="@{/talent}" method="get">
    <input type="hidden" name="talentName" th:value="${talentForm.talentName}">
    <input type="hidden" name="reason" th:value="${talentForm.reason}">
    <button type="submit">修正</button>
</form>


<form th:action="@{/talent/confirm}" method="post" th:object="${talentForm}">
    タレント名:
    <input type="text" th:field="*{talentName}">
    <div th:errors="*{talentName}" style="color:red"></div>
    <br>

    好きな理由:
    <input type="text" th:field="*{reason}">
    <div th:errors="*{reason}" style="color:red"></div> <br>
    
    <button type="submit">確認画面へ</button> </form>
