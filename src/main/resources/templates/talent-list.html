<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掲示板一覧</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background-color: #f0f2f5; color: #1c1e21; line-height: 1.5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #2a5d84; padding-bottom: 10px; color: #2a5d84; }
        
        /* 検索フォーム */
        .search-form { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* 掲示板カード */
        .post-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border-left: 5px solid #2a5d84; }
        .post-header { display: flex; justify-content: space-between; font-size: 0.85em; color: #65676b; border-bottom: 1px solid #ebedf0; padding-bottom: 8px; margin-bottom: 10px; }
        .post-user { font-weight: bold; color: #2a5d84; }
        .post-title { font-weight: bold; color: #1c1e21; margin-left: 10px; }
        .post-content { font-size: 1.05em; white-space: pre-wrap; word-wrap: break-word; }
        
        /* 操作ボタン */
        .admin-controls { text-align: right; margin-top: 10px; }
        .btn-edit { color: #007bff; text-decoration: none; font-size: 0.9em; margin-right: 10px; }
        .btn-delete { background: none; border: 1px solid #ff4d4d; color: #ff4d4d; border-radius: 4px; cursor: pointer; padding: 2px 8px; font-size: 0.8em; }
        
        /* ページネーション */
        .pagination { display: flex; list-style: none; gap: 5px; padding: 0; justify-content: center; margin-top: 30px; }
        .pagination a, .pagination span { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; text-decoration: none; background: white; }
        .active-page { background-color: #2a5d84 !important; color: white; border-color: #2a5d84; }
        
        /* ログアウトエリア */
        .footer-info { margin-top: 40px; padding: 20px; background: #e4e6eb; border-radius: 8px; text-align: center; }
    </style>
	
</head>

<body>
    <div class="container">
        <h1>掲示板タイムライン</h1>

        <div th:if="${message}" style="background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin-bottom: 20px;">
            <span th:text="${message}"></span>
            <a th:href="@{/talent}" style="margin-left: 10px; font-weight: bold;">[ 続けて投稿する ]</a>
        </div>

        <div th:if="${deleteMessage}" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 20px;">
            <span th:text="${deleteMessage}"></span>
        </div>

        <form th:action="@{/talent/list}" method="get" class="search-form">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="キーワードで検索" style="padding: 8px; width: 60%; border: 1px solid #ddd; border-radius: 4px;">
            <button type="submit" style="padding: 8px 15px; background: #2a5d84; color: white; border: none; border-radius: 4px; cursor: pointer;">検索</button>
            <a th:href="@{/talent/list}" style="font-size: 0.9em; margin-left: 10px; color: #666;">クリア</a>
        </form>

        <div th:each="talent : ${talentList}" class="post-card">
			<div class="post-header">
			    <div>
			        投稿者: <span class="post-user" th:text="${talent.createdBy}">ユーザー名</span>
			        <span class="post-title" th:text="${'「' + talent.talentName + '」'}">タイトル</span>
			        
			        <div style="color: #999; font-size: 0.8em; margin-top: 2px;">
			            <span th:text="${#temporals.format(talent.createdAt, 'yyyy/MM/dd HH:mm')}">日時</span>
			        </div>
			    </div>
			    <div style="color: #999;">No.<span th:text="${talent.id}">1</span></div>
			</div>

            <div class="post-content" th:text="${talent.reason}">理由・本文</div>

            <div class="admin-controls" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/talent/edit(id=${talent.id})}" class="btn-edit">編集</a>
                <form th:action="@{/talent/delete}" method="post" style="display:inline;">
                    <input type="hidden" name="id" th:value="${talent.id}">
                    <button type="submit" class="btn-delete" onclick="return confirm('この投稿を削除しますか？');">削除</button>
                </form>
            </div>
        </div>

        <nav th:if="${page.totalPages > 1}">
            <ul class="pagination">
                <li>
                    <a th:unless="${page.first}" th:href="@{/talent/list(page=${page.number - 1}, keyword=${keyword})}">前へ</a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                    <span th:if="${i == page.number}" th:text="${i + 1}" class="active-page">1</span>
                    <a th:unless="${i == page.number}" th:href="@{/talent/list(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
                </li>
                <li>
                    <a th:unless="${page.last}" th:href="@{/talent/list(page=${page.number + 1}, keyword=${keyword})}">次へ</a>
                </li>
            </ul>
        </nav>

        <div class="footer-info">
            <p>現在 <strong><span sec:authentication="name">ユーザー名</span></strong> さんとしてログイン中</p>
            <form th:action="@{/logout}" method="post">
                <button type="submit" style="padding: 10px 20px; background: #606770; color: white; border: none; border-radius: 4px; cursor: pointer;">ログアウト</button>
            </form>
            <div style="margin-top: 15px;">
                <a th:href="@{/talent}" style="color: #2a5d84; text-decoration: none;">+ 新しく投稿する</a>
            </div>
        </div>
    </div>
</body>
</html>
