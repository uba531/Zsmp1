<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>掲示板一覧</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
	<div class="container">
		<h1>掲示板タイムライン</h1>

		<div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
			<span th:text="${message}"></span>
			<a th:href="@{/talent}" class="alert-link ms-2">続けて投稿する</a>
		</div>

		<div th:if="${deleteMessage}" class="alert alert-danger" role="alert">
			<span th:text="${deleteMessage}"></span>
		</div>

		<form th:action="@{/talent/list}" method="get" class="search-form">

			<div th:if="${talentList.isEmpty() && (keyword == null || keyword == '')}"
				class="text-center py-5 shadow-sm bg-white rounded border mb-4">
				<!--				&#128172はふきだしアイコン-->
				<div class="mb-3"><span style="font-size: 3rem;">&#128172;</span></div>
				<h5 class="text-secondary">掲示板へようこそ！</h5>
				<p class="text-muted small">まだ投稿がありません。投稿をしてみませんか？</p>
				<a th:href="@{/talent}" class="btn btn-primary btn-sm mt-2">＋ 投稿する</a>
			</div>

			<div th:if="${talentList.isEmpty() && keyword != null && keyword != ''}"
				class="text-center py-5 shadow-sm bg-white rounded border mb-4">
				<h5 class="text-secondary">「<span class="text-primary fw-bold"
						th:text="${keyword}"></span>」に一致する投稿はありません</h5>
				<p class="text-muted small">キーワードに誤字がないか確認するか、別の言葉で試してみてください。</p>

				<div class="mt-3">
					<a th:href="@{/talent/list}" class="btn btn-outline-secondary btn-sm">
						検索を解除してすべて表示
					</a>
				</div>
			</div>

			<div class="input-group">
				<input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="キーワードで検索">
				<button type="submit" class="btn btn-primary">検索</button>
				<a th:href="@{/talent/list}" class="btn btn-outline-secondary">クリア</a>
			</div>
		</form>

		<div th:each="talent : ${talentList}" class="post-card">
			<div class="post-header">
				<div>
					投稿者: <span class="post-user" th:text="${talent.createdBy}"></span>
					<span class="post-title" th:text="${'「' + talent.talentName + '」'}"></span>
					<div class="text-muted mt-1" style="font-size: 0.9em;">
						<span
							th:text="${#temporals.format(talent.createdAt.atZoneSameInstant(T(java.time.ZoneId).of('Asia/Tokyo')), 'yyyy/MM/dd HH:mm')}"></span>
					</div>
				</div>
				<div class="text-muted">No.<span th:text="${talent.id}"></span></div>
			</div>

			<div class="post-content" th:text="${talent.reason}"></div>

			<div class="admin-controls" 
			     th:if="${#authorization.expression('hasRole(''ADMIN'')') || talent.createdBy == #authentication.name}">
			    
			    <a th:href="@{/talent/edit(id=${talent.id})}" class="btn btn-sm btn-link text-decoration-none">編集</a>
			    
			    <form th:action="@{/talent/delete}" method="post" style="display:inline;">
			        <input type="hidden" name="id" th:value="${talent.id}">
			        <button type="submit" class="btn btn-sm btn-outline-danger"
			                onclick="return confirm('削除しますか？');">削除</button>
			    </form>
			</div>
		</div>

		<nav th:if="${page.totalPages > 1}" class="mt-4">
			<ul class="pagination justify-content-center">
				<li class="page-item" th:classappend="${page.first} ? 'disabled'">
					<a class="page-link" th:href="@{/talent/list(page=${page.number - 1}, keyword=${keyword})}">前へ</a>
				</li>
				<li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
					th:classappend="${i == page.number} ? 'active'">
					<a class="page-link" th:href="@{/talent/list(page=${i}, keyword=${keyword})}"
						th:text="${i + 1}"></a>
				</li>
				<li class="page-item" th:classappend="${page.last} ? 'disabled'">
					<a class="page-link" th:href="@{/talent/list(page=${page.number + 1}, keyword=${keyword})}">次へ</a>
				</li>
			</ul>
		</nav>

		<div class="footer-info">
			<p class="mb-3">現在 <strong><span sec:authentication="name"></span></strong> さんがログイン中</p>
			<div class="d-flex justify-content-center gap-2">
				<form th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-secondary">ログアウト</button>
				</form>
				<a th:href="@{/talent}" class="btn btn-primary">＋ 投稿する</a>
			</div>
		</div>
	</div>
</body>

</html>
