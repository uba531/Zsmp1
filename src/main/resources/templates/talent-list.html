<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>タレント一覧</title>
</head>

<body>
	<h1>登録済みタレント一覧</h1>

	<div th:if="${message}">
		<span th:text="${message}" style="color: green; font-weight: bold;"></span>
		<a th:href="@{/talent}">[ 続けて登録する ]</a>
	</div>

	<div th:if="${deleteMessage}">
		<span th:text="${deleteMessage}" style="color: red; font-weight: bold;"></span>
	</div>

	<form th:action="@{/talent/list}" method="get" style="margin-bottom: 20px;">
		<input type="text" name="keyword" th:value="${keyword}" placeholder="名前で検索">
		<button type="submit">検索</button>
		<a th:href="@{/talent/list}">クリア</a>
	</form>

	<table>
		<thead>
			<tr>
				<th>ID</th>
				<th>名前</th>
				<th>理由</th>
				<th>操作</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="talent : ${talentList}">
				<td th:text="${talent.id}">1</td>
				<td th:text="${talent.talentName}">名前</td>
				<td th:text="${talent.reason}">理由</td>
				<td>
					<a th:href="@{/talent/edit(id=${talent.id})}" sec:authorize="hasRole('ADMIN')">編集</a>

					<form th:action="@{/talent/delete}" method="post" style="display:inline;"
						sec:authorize="hasRole('ADMIN')">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
						<input type="hidden" name="id" th:value="${talent.id}">
						<button type="submit" onclick="return confirm('本当に削除しますか？');">削除</button>
					</form>
				</td>
			</tr>
		</tbody>
	</table>

	<div th:if="${page.totalPages > 1}" style="margin-top: 20px;">
		<nav>
			<ul style="list-style: none; display: flex; gap: 10px;">

				<li>
					<span th:if="${page.first}" style="color: gray;">前へ</span>
					<a th:unless="${page.first}"
						th:href="@{/talent/list(page=${page.number - 1}, keyword=${keyword})}">前へ</a>
				</li>

				<li th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
					<span th:if="${i == page.number}" th:text="${i + 1}"
						style="font-weight: bold; border: 1px solid #000; padding: 2px 5px;">1</span>
					<a th:unless="${i == page.number}" th:href="@{/talent/list(page=${i}, keyword=${keyword})}"
						th:text="${i + 1}">1</a>
				</li>

				<li>
					<span th:if="${page.last}" style="color: gray;">次へ</span>
					<a th:unless="${page.last}"
						th:href="@{/talent/list(page=${page.number + 1}, keyword=${keyword})}">次へ</a>
				</li>

			</ul>
		</nav>
	</div>
	<form th:action="@{/logout}" method="post">
		<p>ログイン中：<span sec:authentication="name">ユーザー名</span>さん</p>
		<button type="submit">ログアウト</button>
	</form>

	<br>
	<a th:href="@{/talent}">新規登録に戻る</a>
</body>

</html>
